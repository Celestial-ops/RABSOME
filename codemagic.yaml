workflows:
  ios-workflow:
    name: Build iOS app
    max_build_duration: 60
    environment:
      vars:
        # Use your bundle ID
        BUNDLE_ID: "com.yourname.RansomApp"
      xcode: "15.2.1"  # Pick the Xcode version you need
    scripts:
      - name: Install dependencies
        script: |
          echo "No dependencies for this minimal project"
      - name: Build iOS app
        script: |
          echo "Archiving project..."
          xcodebuild -project RansomApp.xcodeproj \
                     -scheme RansomApp \
                     -sdk iphoneos \
                     -configuration Release \
                     archive \
                     -archivePath $PWD/build/RansomApp.xcarchive
          
          echo "Exporting IPA..."
          xcodebuild -exportArchive \
                     -archivePath $PWD/build/RansomApp.xcarchive \
                     -exportOptionsPlist ExportOptions.plist \
                     -exportPath $PWD/build
    artifacts:
      - build/*.ipa
